<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh-hygiene — Repo Manager</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #d4d4d4;
    --text-dim: #6b6b6b;
    --accent: #d4a853;
    --accent-glow: rgba(212,168,83,0.15);
    --green: #4ec9b0;
    --red: #f44747;
    --blue: #569cd6;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  header .logo span { color: var(--text-dim); font-weight: 400; }
  header .status {
    margin-left: auto;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(78,201,176,0.4);
  }
  .status-dot.off { background: var(--red); box-shadow: 0 0 6px rgba(244,71,71,0.4); }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg.system { align-self: center; max-width: 100%; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14px;
    word-wrap: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: #1a1a1a;
    border-bottom-right-radius: 2px;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.system .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 8px 16px;
  }
  .msg.system.error .msg-bubble {
    border-color: rgba(244,71,71,0.3);
    color: var(--red);
  }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble code {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
  }

  /* Tool call display */
  .tool-call {
    margin-top: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    font-size: 13px;
  }
  .tool-call-header {
    background: var(--surface);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .tool-call-header:hover { background: var(--surface2); }
  .tool-call-icon { font-size: 14px; }
  .tool-call-name { font-family: var(--mono); color: var(--blue); font-size: 12px; }
  .tool-call-chevron { margin-left: auto; color: var(--text-dim); transition: transform 0.2s; }
  .tool-call.open .tool-call-chevron { transform: rotate(180deg); }
  .tool-call-body {
    display: none;
    padding: 10px 12px;
    background: rgba(0,0,0,0.2);
    font-family: var(--mono);
    font-size: 12px;
    white-space: pre-wrap;
    color: var(--text-dim);
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-call.open .tool-call-body { display: block; }

  /* Confirmation bar */
  .confirm-bar {
    align-self: center;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeIn 0.25s ease;
  }
  .confirm-bar .text { font-size: 14px; color: var(--accent); flex: 1; }
  .confirm-bar button {
    padding: 8px 18px;
    border-radius: 5px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-confirm {
    background: var(--accent);
    color: #1a1a1a;
  }
  .btn-confirm:hover { filter: brightness(1.1); }
  .btn-reject {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border) !important;
  }
  .btn-reject:hover { color: var(--text); border-color: var(--text-dim) !important; }

  /* Input area */
  .input-container {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-container input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-container input:focus { border-color: var(--accent); }
  .input-container input::placeholder { color: var(--text-dim); }
  .input-container button {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: var(--radius);
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .input-container button:hover { filter: brightness(1.1); }
  .input-container button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Loading dots */
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
</style>
</head>
<body>

<header>
  <div class="logo">gh-hygiene <span>/ repo manager</span></div>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting...</span>
  </div>
</header>

<div class="chat-container" id="chat"></div>

<div class="input-container">
  <input id="msg-input" type="text" placeholder="Tell me what to do with your repos..." disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let ws = null;
let pendingConfirm = false;

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocol + '//' + location.host + '/ws/chat');

  ws.onopen = () => {
    setStatus(true, 'connected');
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  };

  ws.onclose = () => {
    setStatus(false, 'disconnected');
    input.disabled = true;
    sendBtn.disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onerror = () => {
    setStatus(false, 'error');
  };
}

function setStatus(ok, text) {
  statusDot.className = 'status-dot' + (ok ? '' : ' off');
  statusText.textContent = text;
}

function handleMessage(msg) {
  removeTyping();

  switch (msg.type) {
    case 'text':
      addMessage('assistant', msg.content);
      break;
    case 'tool_calls':
      addToolCalls(msg.content, msg.tools);
      break;
    case 'confirm_request':
      addConfirmBar(msg.content, msg.tools);
      pendingConfirm = true;
      break;
    case 'status':
      addMessage('system', msg.content);
      break;
    case 'error':
      addMessage('system', msg.content, true);
      break;
    case 'pong':
      break;
  }
  scrollDown();
}

function addMessage(role, content, isError = false) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isError ? ' error' : '');
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderMarkdown(content);
  div.appendChild(bubble);
  
  chat.appendChild(div);
}

function addToolCalls(text, tools) {
  const div = document.createElement('div');
  div.className = 'msg assistant';

  if (text) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = renderMarkdown(text);
    div.appendChild(bubble);
  }

  tools.forEach(t => {
    const tc = document.createElement('div');
    tc.className = 'tool-call';
    tc.innerHTML = `
      <div class="tool-call-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="tool-call-icon">🔧</span>
        <span class="tool-call-name">${esc(t.name)}</span>
        <span class="tool-call-chevron">▾</span>
      </div>
      <div class="tool-call-body">${esc(JSON.stringify(t.args, null, 2))}</div>
    `;
    div.appendChild(tc);
  });

  chat.appendChild(div);
}

function addConfirmBar(text, tools) {
  const div = document.createElement('div');
  div.className = 'confirm-bar';
  div.id = 'confirm-bar';
  div.innerHTML = `
    <span class="text">⚠️ ${esc(text)}</span>
    <button class="btn-confirm" onclick="confirmAction()">✓ Confirm</button>
    <button class="btn-reject" onclick="rejectAction()">✗ Cancel</button>
  `;
  chat.appendChild(div);
}

function addTyping() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  scrollDown();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/^### (.+)/gm, '<strong>$1</strong>')
    .replace(/^## (.+)/gm, '<strong>$1</strong>')
    .replace(/^# (.+)/gm, '<strong>$1</strong>')
    .replace(/^- (.+)/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN || pendingConfirm) return;

  addMessage('user', text);
  input.value = '';
  addTyping();

  ws.send(JSON.stringify({ type: 'message', content: text }));
}

function confirmAction() {
  if (!ws || !pendingConfirm) return;
  removeConfirmBar();
  pendingConfirm = false;
  addTyping();
  ws.send(JSON.stringify({ type: 'confirm' }));
}

function rejectAction() {
  if (!ws || !pendingConfirm) return;
  removeConfirmBar();
  pendingConfirm = false;
  addTyping();
  ws.send(JSON.stringify({ type: 'reject' }));
}

function removeConfirmBar() {
  const el = document.getElementById('confirm-bar');
  if (el) el.remove();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

connect();
</script>
</body>
</html>
